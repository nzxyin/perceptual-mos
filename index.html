<!DOCTYPE html>
<html lang="en">
<head>
  <title>Naturalness MOS Test</title>
  <meta charset="UTF-8">
  <style>
  body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
  }
  h1, h2 {
      color: #333;
  }
  ul {
      margin-top: 0;
  }
  .scale {
      margin-left: 20px;
  }
  
</head>
<body>
  <h1>Naturalness MOS Test</h1>
  <h2>Participant Instructions</h2>

    <p>Thank you for participating in this listening study.</p>

    <p>
        In this task, you will hear a series of short speech recordings.
        After listening to each recording, you will rate how <strong>natural</strong> the speech sounds.
    </p>

    <h3>What “Naturalness” Means</h3>

    <p>
        Naturalness refers to how much the speech sounds like it was produced by a real human
        speaking in a normal, everyday situation.
    </p>

    <p>When rating naturalness, consider:</p>
    <ul>
        <li>Does the voice sound human-like?</li>
        <li>Does the rhythm and intonation sound natural?</li>
        <li>Does the speech flow smoothly?</li>
        <li>Are there any robotic, metallic, distorted, or artificial qualities?</li>
    </ul>

    <p>Please focus only on <strong>how natural the speech sounds</strong>, not:</p>
    <ul>
        <li>Whether you like the voice</li>
        <li>Whether the content is interesting</li>
        <li>Whether the speaker sounds attractive</li>
        <li>Whether the message is intelligible (unless unnaturalness affects it)</li>
    </ul>

    <h3>Rating Scale</h3>

    <p>
        You will rate each sample using the following 5-point scale:
    </p>

    <div class="scale">
        <p>1 – Very unnatural (highly robotic or artificial)</p>
        <p>2 – Unnatural</p>
        <p>3 – Neutral / somewhat natural</p>
        <p>4 – Natural</p>
        <p>5 – Very natural (indistinguishable from a real human speaker)</p>
    </div>

    <p>
        Choose the rating that best reflects your overall impression of the sample.
    </p>

    <h3>Listening Guidelines</h3>

    <ul>
        <li>Use headphones in a quiet environment if possible.</li>
        <li>Listen to each sample carefully before rating.</li>
        <li>You may replay the sample if replay is allowed.</li>
        <li>Trust your first overall impression — there are no right or wrong answers.</li>
        <li>Rate each sample independently.</li>
    </ul>

    <p>
        Your responses are anonymous and will be used only for research purposes.
    </p>

    <p><strong>Thank you for your participation.</strong></p>

</body>
</html>
